version: '3'
services:
  messaging-app:
    container_name: "messaging"
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "5005:5005"
  messaging-database:
    container_name: "messaging-db"
    image: mariadb
    volumes:
      - ./database:/docker-entrypoint-initdb.d/
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: messaging
      MYSQL_ROOT_PASSWORD: root_password